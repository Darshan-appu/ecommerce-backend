<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="utf-8">
   <title>Aeromatx | Profile</title>
   <meta content="width=device-width, initial-scale=1.0" name="viewport">
   <link href="img/favicon.ico" rel="icon">
   <link rel="preconnect" href="https://fonts.gstatic.com">
   <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
   <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
   <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">
   <link href="css/register.css" rel="stylesheet">
</head>
<body onload="loadLayout()">

    <div id="header"></div>

    <!-- Page Header Start -->
    <div class="container-fluid bg-secondary mb-5">
        <div class="d-flex flex-column align-items-center justify-content-center" style="min-height: 300px">
            <h1 class="font-weight-semi-bold text-uppercase mb-3">My Profile</h1>
            <div class="d-inline-flex">
                <p class="m-0"><a href="index.html">Home</a></p>
                <p class="m-0 px-2">-</p>
                <p class="m-0">Profile</p>
            </div>
        </div>
    </div>
    <!-- Page Header End -->

    <!-- Profile Start -->
    <div class="container-fluid pt-5">
        <div class="text-center mb-4">
            <h2 class="section-title px-5"><span class="px-2">Account Information</span></h2>
        </div>
        <div class="row px-xl-5">
            <div class="col-lg-8 mx-auto mb-5">
                <div class="card border-0">
                    <div class="card-header bg-primary text-white">
                        <i class="fa fa-user-circle mr-2"></i>Personal Details
                    </div>
                    <div class="card-body">
                        <form id="profileForm">
                            <div class="form-group row">
                                <label class="col-sm-3 col-form-label font-weight-semi-bold">Full Name</label>
                                <div class="col-sm-9">
                                    <input type="text" class="form-control" id="fullName" readonly>
                                </div>
                            </div>
                            <div class="form-group row">
                                <label class="col-sm-3 col-form-label font-weight-semi-bold">Email</label>
                                <div class="col-sm-9">
                                    <input type="email" class="form-control" id="email" readonly>
                                    <small class="text-muted">Email cannot be changed</small>
                                </div>
                            </div>
                            <div class="form-group row">
                                <label class="col-sm-3 col-form-label font-weight-semi-bold">Company</label>
                                <div class="col-sm-9">
                                    <input type="text" class="form-control" id="company" readonly>
                                </div>
                            </div>
                            <div class="text-right">
                                <a href="edit-profile.html" class="btn btn-primary py-2 px-4">Edit Profile</a>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="text-center mt-4">
                    <a href="logout.html" class="btn btn-outline-danger py-2 px-4">
                        <i class="fa fa-sign-out-alt mr-1"></i>Logout
                    </a>
                </div>
            </div>
        </div>
    </div>
    <!-- Profile End -->

    <div id="footer"></div>
    <a href="#" class="btn btn-primary back-to-top"><i class="fa fa-angle-double-up"></i></a>

    <!-- JS Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
    <script src="lib/easing/easing.min.js"></script>
    <script src="lib/owlcarousel/owl.carousel.min.js"></script>
    <script src="js/main.js"></script>

    <!-- Load profile data -->
<script>
document.addEventListener('DOMContentLoaded', async () => {
    const pathname = window.location.pathname;
    const urlParams = new URLSearchParams(window.location.search);
    const isAdminPath = pathname.includes('/admin_pannel/') || urlParams.get('role') === 'admin';


    const token = isAdminPath ? localStorage.getItem('adminToken') : localStorage.getItem('userToken');

    if (!token) {
        alert('Please log in first');
        window.location.href = isAdminPath ? '/admin_pannel/admin-login.html' : 'login.html';
        return;
    }

    try {
        const response = await fetch('http://localhost:8080/api/users/profile', {
            method: 'GET',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            }
        });

        if (!response.ok) {
            throw new Error('Failed to fetch user data');
        }

        const user = await response.json();
        document.getElementById('fullName').value = user.username || '';
        document.getElementById('email').value = user.email || '';
        document.getElementById('company').value = user.company || '';

        // Setup logout link dynamically
        const logoutBtn = document.querySelector('a[href="logout.html"]');
        logoutBtn.setAttribute('href', isAdminPath ? '/admin_pannel/admin-login.html' : 'login.html');

        logoutBtn.addEventListener('click', () => {
            if (isAdminPath) {
                localStorage.removeItem('adminToken');
            } else {
                localStorage.removeItem('userToken');
            }
            localStorage.removeItem('userId');
            localStorage.removeItem('userUsername');
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userRoles');
        });

    } catch (err) {
        console.error('Profile fetch failed:', err);
        alert('Error loading profile. Please try again later.');
    }
});
</script>

</body>
</html>
